function doClear(){
  showConfirm('Clear the entire board?','This cannot be undone.',()=>{
    pushUndo(); elements=[]; playerCnt={teammate:1,enemy:1}; waypointCnt=1;
    waypointColorCnt={yellow:1,blue:1,green:1,red:1,purple:1,white:1};
    selectedEl=null; updateSidebar(null); render(); showToast('Board cleared','success');
  });
}
function doNew(){
  if(!elements.length){ _doNewBoard(); return; }
  showConfirm('Start a new board?','Unsaved changes will be lost.',_doNewBoard); return;
}
function _doNewBoard(){
  pushUndo(); elements=[]; playerCnt={teammate:1,enemy:1}; waypointCnt=1;
  waypointColorCnt={yellow:1,blue:1,green:1,red:1,purple:1,white:1};
  document.getElementById('sname').value='New Strategy';
  document.getElementById('mob-sname').value='New Strategy';
  getNotesEditor().innerHTML='';
  document.getElementById('mob-notes-ta').value='';
  selectedEl=null; updateSidebar(null); render(); syncNotesBar();
  showToast('New board','success');
}
function doSave(){
  const state=getBoardState();
  if(!state.name.trim()){showToast('Give this strat a name first','error');return;}
  const lib=getLibrary();
  const idx=lib.findIndex(s=>s.name===state.name&&s.map===state.map);
  state.savedAt=Date.now();
  if(idx>=0){lib[idx]=state;showToast('Strat updated ✓','success');}
  else{lib.push(state);showToast('Strat saved ✓','success');}
  saveLibrary(lib);
}
function doShare(){
  const encoded=encodeState(getBoardState());
  if(!encoded){showToast('Failed to encode','error');return;}
  const url=location.origin+location.pathname+'#strat='+encoded;
  navigator.clipboard.writeText(url).then(()=>showToast('Share link copied ✓','success'))
    .catch(()=>prompt('Copy this link:',url));
}

/* ═══════════════════════════════════════════
   EXPORT PNG
═══════════════════════════════════════════ */
function doExport(){
  const stratName=document.getElementById('sname').value||'strat';
  const mapName=(document.querySelector('#map-sel option:checked')||{}).textContent||currentMap;
  const notesHTML=getNotesEditor().innerHTML;
  const notesHasContent=getNotesEditor().textContent.trim().length>0;

  // ── Compute tight bounding box around the map image + all elements ──
  const EXPORT_PAD=40; // world-space padding around content
  let minWX=Infinity,minWY=Infinity,maxWX=-Infinity,maxWY=-Infinity;

  // Include map image bounds
  if(mapLoaded&&mapImages[currentMap]){
    const img=mapImages[currentMap];
    minWX=Math.min(minWX,0);       minWY=Math.min(minWY,0);
    maxWX=Math.max(maxWX,img.width); maxWY=Math.max(maxWY,img.height);
  }

  // Include all elements
  elements.forEach(el=>{
    if(el.type==='player'||el.type==='icon'||el.type==='waypoint'){
      const r=22; // world-space radius buffer
      minWX=Math.min(minWX,el.x-r); minWY=Math.min(minWY,el.y-r);
      maxWX=Math.max(maxWX,el.x+r); maxWY=Math.max(maxWY,el.y+r);
    } else if(el.type==='smokezone'||el.type==='molotovzone'){
      minWX=Math.min(minWX,el.x-el.r); minWY=Math.min(minWY,el.y-el.r);
      maxWX=Math.max(maxWX,el.x+el.r); maxWY=Math.max(maxWY,el.y+el.r);
    } else if(el.type==='path'&&el.points.length){
      el.points.forEach(p=>{
        minWX=Math.min(minWX,p.x); minWY=Math.min(minWY,p.y);
        maxWX=Math.max(maxWX,p.x); maxWY=Math.max(maxWY,p.y);
      });
    } else if(el.type==='text'){
      const fs=el.fontSize||14;
      const tw=el.width||(el.text.length*fs*0.6);
      const th=el.height||(fs*1.8);
      minWX=Math.min(minWX,el.x); minWY=Math.min(minWY,el.y);
      maxWX=Math.max(maxWX,el.x+tw); maxWY=Math.max(maxWY,el.y+th);
    } else if(el.type==='timer'){
      const pad=24; // world-space half-width estimate for the pill
      minWX=Math.min(minWX,el.x-pad); minWY=Math.min(minWY,el.y-10);
      maxWX=Math.max(maxWX,el.x+pad); maxWY=Math.max(maxWY,el.y+10);
    }
  });

  // Fallback if board is empty
  if(!isFinite(minWX)){ minWX=0; minWY=0; maxWX=1024; maxWY=1024; }

  minWX-=EXPORT_PAD; minWY-=EXPORT_PAD;
  maxWX+=EXPORT_PAD; maxWY+=EXPORT_PAD;

  const contentW=maxWX-minWX, contentH=maxWY-minWY;
  // Cap at a reasonable export size (4k wide max)
  const maxDim=3200;
  const exportZ=Math.min(2, maxDim/Math.max(contentW,contentH));
  const mapW=Math.round(contentW*exportZ);
  const mapH=Math.round(contentH*exportZ);

  // ── Render to offscreen canvas at the computed view ──
  const offMap=document.createElement('canvas');
  offMap.width=mapW; offMap.height=mapH;
  const om=offMap.getContext('2d');
  // Save current viewport, set to export viewport
  const savedVx=vx,savedVy=vy,savedVz=vz;
  vx=-minWX*exportZ; vy=-minWY*exportZ; vz=exportZ;
  // Draw background + map + elements
  om.fillStyle='#0d0f14'; om.fillRect(0,0,mapW,mapH);
  if(mapLoaded&&mapImages[currentMap]){
    const img=mapImages[currentMap];
    om.drawImage(img,vx,vy,img.width*vz,img.height*vz);
  }
  // Swap context temporarily so render() draws into om
  const realCtx=ctx;
  // Re-use drawEl but pass our offscreen ctx via a local draw pass
  for(const el of elements){
    om.save();
    drawElToCtx(om,el,false,exportZ);
    om.restore();
  }
  // Restore viewport
  vx=savedVx; vy=savedVy; vz=savedVz;

  // ── Notes panel: measure content height, then compose ──────────────────────
  const NOTES_W=320, PAD=20;
  const HEADER_H=PAD+60; // top pad + title + subtitle + divider

  // Walk the editor DOM into a flat run list
  function collectNotesRuns(){
    const runs=[];
    function walk(node,styles,lCtx){
      if(node.nodeType===Node.TEXT_NODE){
        const txt=node.textContent.replace(/\u200B/g,'');
        if(txt) runs.push({...styles,text:txt,...lCtx});
        return;
      }
      if(node.nodeType!==Node.ELEMENT_NODE) return;
      const tag=node.tagName.toLowerCase();
      let s={...styles};
      const ifs=node.style&&node.style.fontSize;
      if(ifs) s.fontSize=Math.max(14,parseFloat(ifs)||s.fontSize);
      if(tag==='b'||tag==='strong'||(node.style.fontWeight&&(node.style.fontWeight==='bold'||parseInt(node.style.fontWeight)>=600))) s.bold=true;
      if(tag==='i'||tag==='em'||node.style.fontStyle==='italic') s.italic=true;
      if(tag==='u'||(node.style.textDecoration&&node.style.textDecoration.includes('underline'))) s.underline=true;
      const isBlock=['p','div','li','ul','ol','h1','h2','h3','h4','blockquote'].includes(tag);
      let lc={...lCtx};
      if(tag==='ul') lc={listType:'ul',listDepth:(lCtx.listDepth||0)+1,listIndex:0};
      if(tag==='ol') lc={listType:'ol',listDepth:(lCtx.listDepth||0)+1,listIndex:0};
      if(tag==='li'){ lc={...lc,isListItem:true}; lCtx.listIndex=(lCtx.listIndex||0)+1; lc.listIndex=lCtx.listIndex; }
      if(tag==='br'){ runs.push({...s,...lc,text:'\n'}); return; }
      for(const child of node.childNodes) walk(child,s,lc);
      if(isBlock) runs.push({...s,...lc,text:'\n'});
    }
    walk(getNotesEditor(),{fontSize:16,bold:false,italic:false,underline:false},
         {listType:null,listDepth:0,listIndex:0,isListItem:false});
    return runs;
  }

  // Layout engine: measure or draw rich text. Returns the final Y reached.
  function layoutNotes(c,maxW,startY,doDraw){
    const runs=collectNotesRuns();
    const logicalLines=[];
    let cur=[];
    for(const r of runs){ if(r.text==='\n'){logicalLines.push(cur);cur=[];}else cur.push(r); }
    if(cur.length) logicalLines.push(cur);

    let y=startY;
    for(const line of logicalLines){
      if(!line.length){ y+=10; continue; }
      const fr=line[0];
      let prefix='',prefixW=0,indent=0;
      if(fr.isListItem){
        indent=(fr.listDepth||1)*16;
        prefix=fr.listType==='ul'?'\u2022 ':(fr.listIndex+'. ');
        c.font=`${fr.fontSize||16}px -apple-system,sans-serif`;
        prefixW=c.measureText(prefix).width;
      }
      const words=[];
      for(const run of line){
        const fs=run.fontSize||16;
        c.font=`${run.italic?'italic ':''}${run.bold?'bold ':''}${fs}px -apple-system,sans-serif`;
        const sp=c.measureText(' ').width;
        for(const word of run.text.split(' ')){ if(word) words.push({word,run,w:c.measureText(word).width,spW:sp}); }
      }
      const avail=maxW-indent-prefixW;
      const rows=[];
      let rw=[],rW=0;
      for(const wo of words){
        const needed=rw.length?rW+wo.spW+wo.w:wo.w;
        if(needed>avail&&rw.length){ rows.push(rw); rw=[wo]; rW=wo.w; }
        else{ if(rw.length)rW+=wo.spW+wo.w; else rW=wo.w; rw.push(wo); }
      }
      if(rw.length) rows.push(rw);
      if(!rows.length){ y+=6; continue; }

      for(let ri=0;ri<rows.length;ri++){
        const row=rows[ri];
        let x=PAD+indent, rowH=0;
        for(const wo of row) rowH=Math.max(rowH,wo.run.fontSize||16);
        if(doDraw){
          if(ri===0&&prefix){
            c.font=`${fr.fontSize||16}px -apple-system,sans-serif`;
            c.fillStyle='#c8cad8'; c.fillText(prefix,x,y); x+=prefixW;
          }
          for(const wo of row){
            const run=wo.run,fs=run.fontSize||16;
            c.font=`${run.italic?'italic ':''}${run.bold?'bold ':''}${fs}px -apple-system,sans-serif`;
            c.fillStyle='#c8cad8'; c.fillText(wo.word,x,y);
            if(run.underline){
              c.strokeStyle='#c8cad8'; c.lineWidth=Math.max(1,fs*0.07);
              c.beginPath(); c.moveTo(x,y+fs*0.18); c.lineTo(x+wo.w,y+fs*0.18); c.stroke();
            }
            x+=wo.w+wo.spW;
          }
        }
        y+=Math.max(rowH*1.55,20);
      }
    }
    return y;
  }

  // Measure exact notes height via a scratch context (no actual drawing)
  let notesH=mapH; // default: match map if no notes
  if(notesHasContent){
    const scratch=document.createElement('canvas').getContext('2d');
    const measuredY=layoutNotes(scratch,NOTES_W-PAD*2,HEADER_H,false);
    notesH=measuredY+PAD; // real content height + bottom padding
  }

  // Compose: notes panel is exactly as tall as its content,
  // map is centred vertically if shorter, canvas height = taller of the two
  const totalH=Math.max(mapH,notesHasContent?notesH:0);
  const totalW=notesHasContent?mapW+NOTES_W:mapW;
  const offscreen=document.createElement('canvas');
  offscreen.width=totalW; offscreen.height=totalH;
  const oc=offscreen.getContext('2d');
  oc.fillStyle='#0d0f14'; oc.fillRect(0,0,totalW,totalH);

  const mapOffX=notesHasContent?NOTES_W:0;
  const mapOffY=notesHasContent?Math.round(Math.max(0,(notesH-mapH)/2)):0;
  oc.drawImage(offMap,mapOffX,mapOffY);

  if(notesHasContent){
    // Notes background — only as tall as content, not the full canvas
    oc.fillStyle='#13161f'; oc.fillRect(0,0,NOTES_W,notesH);
    // Divider line — full canvas height
    oc.fillStyle='#2a2f42'; oc.fillRect(NOTES_W-1,0,1,totalH);
    // Header
    oc.textAlign='left'; oc.textBaseline='top';
    oc.fillStyle='#e8c840'; oc.font='bold 22px -apple-system,sans-serif';
    oc.fillText(stratName,PAD,PAD);
    oc.fillStyle='#7a8090'; oc.font='500 15px -apple-system,sans-serif';
    oc.fillText(mapName,PAD,PAD+28);
    oc.fillStyle='#2a2f42'; oc.fillRect(PAD,PAD+52,NOTES_W-PAD*2,1);
    // Rich text body
    oc.textBaseline='top';
    layoutNotes(oc,NOTES_W-PAD*2,HEADER_H,true);
  }

  const link=document.createElement('a');
  link.download=stratName.replace(/\s+/g,'_')+'.png';
  link.href=offscreen.toDataURL('image/png');
  link.click();
  render(); // restore live canvas
  showToast('PNG exported ✓','success');
}

// Draw a single element to an arbitrary canvas context (for export)
function drawElToCtx(c,el,sel,z){
  const toS=(wx,wy)=>({x:vx+wx*z,y:vy+wy*z});
  if(el.type==='player'){
    const s=toS(el.x,el.y),r=Math.max(4,8*Math.min(z,2));
    const pc=el.enemy?ENEMY_COLOR:(PLAYER_COLORS[el.color]||PLAYER_COLORS.blue);
    const angle=el.angle||0;
    c.beginPath(); c.arc(s.x,s.y,r,0,Math.PI*2);
    c.fillStyle=pc.fill; c.fill();
    c.strokeStyle=pc.stroke; c.lineWidth=1.5; c.stroke();
    const chevR=r+Math.max(2,r*0.4);
    const chx=s.x+Math.cos(angle)*chevR,chy=s.y+Math.sin(angle)*chevR;
    const cs=Math.max(2.5,r*0.55),perp=angle+Math.PI/2;
    c.strokeStyle=pc.stroke; c.lineWidth=Math.max(1.2,r*0.22); c.lineCap='round'; c.lineJoin='round';
    c.beginPath();
    c.moveTo(chx-Math.cos(perp)*cs+Math.cos(angle+Math.PI)*cs*0.55,chy-Math.sin(perp)*cs+Math.sin(angle+Math.PI)*cs*0.55);
    c.lineTo(chx+Math.cos(angle)*cs*0.7,chy+Math.sin(angle)*cs*0.7);
    c.lineTo(chx+Math.cos(perp)*cs+Math.cos(angle+Math.PI)*cs*0.55,chy+Math.sin(perp)*cs+Math.sin(angle+Math.PI)*cs*0.55);
    c.stroke();
    // Floating name label
    if(el.name&&el.name.trim()){
      const fs=Math.max(7,Math.round(9*Math.min(z,2)));
      c.font=`600 ${fs}px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif`;
      c.textAlign='center'; c.textBaseline='top';
      c.shadowColor='rgba(0,0,0,0.85)'; c.shadowBlur=Math.max(2,3*Math.min(z,2));
      c.fillStyle=el.enemy?'#aaaaaa':(PLAYER_COLORS[el.color]||PLAYER_COLORS.blue).text;
      c.fillText(el.name.trim(), s.x, s.y+r+Math.max(2,3*Math.min(z,2)));
      c.shadowBlur=0;
    }
  } else if(el.type==='waypoint'){
    const s=toS(el.x,el.y),r=Math.max(7,13*Math.min(z,2));
    const wc=WAYPOINT_COLORS[el.wcolor]||WAYPOINT_COLORS.yellow;
    c.beginPath(); c.arc(s.x,s.y,r,0,Math.PI*2);
    c.fillStyle=wc.fill; c.fill(); c.strokeStyle=wc.stroke; c.lineWidth=2; c.stroke();
    c.fillStyle=wc.text; c.font=`bold ${Math.max(7,12*Math.min(z,2))}px sans-serif`;
    c.textAlign='center'; c.textBaseline='middle'; c.fillText(el.num,s.x,s.y);
  } else if(el.type==='smokezone'){
    const s=toS(el.x,el.y),sr=el.r*z;
    c.globalAlpha=0.22; c.beginPath(); c.arc(s.x,s.y,sr,0,Math.PI*2);
    c.fillStyle='#b0cce0'; c.fill(); c.globalAlpha=0.55;
    c.strokeStyle='#c8dff0'; c.lineWidth=1.5; c.stroke(); c.globalAlpha=1;
    c.font=`600 ${Math.max(9,Math.min(sr*0.45,16))}px sans-serif`;
    c.textAlign='center'; c.textBaseline='middle';
    c.fillStyle='rgba(180,210,230,0.85)'; c.fillText('S',s.x,s.y);
  } else if(el.type==='molotovzone'){
    const s=toS(el.x,el.y),sr=el.r*z;
    c.globalAlpha=0.3; c.beginPath(); c.arc(s.x,s.y,sr,0,Math.PI*2);
    c.fillStyle='#d04010'; c.fill(); c.globalAlpha=0.6;
    c.strokeStyle='#ff7030'; c.lineWidth=1.5; c.stroke(); c.globalAlpha=1;
  } else if(el.type==='icon'){
    const s=toS(el.x,el.y);
    const iconR=Math.max(4,8*Math.min(z,2)); // player-scale radius
    if(el.icon==='nade'){
      _drawNade(c,s.x,s.y,iconR,false);
    } else if(el.icon==='bomb'){
      // Reuse bomb draw path inlined for export ctx
      const r=iconR*0.9;
      c.save();
      c.beginPath(); c.arc(s.x,s.y+r*0.1,r*0.85,0,Math.PI*2);
      c.fillStyle='#222'; c.fill(); c.strokeStyle='#888'; c.lineWidth=1.4; c.stroke();
      c.beginPath(); c.moveTo(s.x,s.y-r*0.85); c.lineTo(s.x,s.y-r*1.4);
      c.strokeStyle='#aaa'; c.lineWidth=Math.max(1,r*0.12); c.lineCap='round'; c.stroke();
      c.beginPath(); c.moveTo(s.x,s.y-r*1.4);
      c.bezierCurveTo(s.x+r*0.4,s.y-r*1.6,s.x+r*0.8,s.y-r*1.3,s.x+r*1.0,s.y-r*1.05);
      c.strokeStyle='#e8c840'; c.lineWidth=Math.max(1,r*0.1); c.stroke();
      c.beginPath(); c.arc(s.x+r*1.0,s.y-r*1.05,r*0.2,0,Math.PI*2);
      c.fillStyle='#ffe060'; c.fill();
      c.restore();
    } else if(el.icon==='sniper'){
      const r=Math.max(4,8*Math.min(z,2));
      _drawSniper(c,s.x,s.y,r,false);
    } else {
      // flash — emoji fallback is fine for flash
      const fs=Math.max(10,16*Math.min(z,2));
      c.font=`${fs}px serif`; c.textAlign='center'; c.textBaseline='middle';
      c.fillText('💥',s.x,s.y);
    }
  } else if(el.type==='timer'){
    // Reuse the shared draw function — pass the export context + zoom
    // We set vx/vy to 0 for export (toS already accounts for offset via vx/vy which are set to export vals)
    drawTimerMarker(c,el,false,z,true);
  } else if(el.type==='path'){
    if(el.points.length<2) return;
    const lw=2.2;
    const color=el.color||'#60aaff';
    const epts=el.points.map(p=>toS(p.x,p.y));
    const etip=epts[epts.length-1];
    if(el.arrow){
      const ang=_smoothAngle(epts);
      const headSize=Math.max(16,lw*7);
      const stopDist=headSize*0.95;
      c.strokeStyle=color; c.lineWidth=lw; c.lineCap='round'; c.lineJoin='round';
      c.beginPath(); c.moveTo(epts[0].x,epts[0].y);
      for(let i=1;i<epts.length-1;i++) c.lineTo(epts[i].x,epts[i].y);
      c.lineTo(etip.x-Math.cos(ang)*stopDist, etip.y-Math.sin(ang)*stopDist);
      c.stroke();
      _arrowHead(c,etip,ang,color,headSize);
    } else {
      c.strokeStyle=color; c.lineWidth=lw; c.lineCap='round'; c.lineJoin='round';
      c.beginPath(); c.moveTo(epts[0].x,epts[0].y);
      for(let i=1;i<epts.length;i++) c.lineTo(epts[i].x,epts[i].y);
      c.stroke();
    }
  } else if(el.type==='text'){
    const s=toS(el.x,el.y);
    const fs=Math.max(6,(el.fontSize||14)*z);
    const PAD=6,lineH=fs*1.4;
    c.font=`500 ${fs}px sans-serif`; c.textAlign='left'; c.textBaseline='top';
    const autoW=c.measureText(el.text).width;
    const bwInner=el.width?el.width*z:autoW;
    const lines=wrapTextLines(c,el.text,bwInner);
    const bw=bwInner+PAD*2,bh=el.height?el.height*z:lines.length*lineH+PAD*1.5;
    c.fillStyle='rgba(0,0,0,0.75)';
    c.beginPath(); c.roundRect(s.x,s.y,bw,bh,4); c.fill();
    c.fillStyle='#fff';
    lines.forEach((ln,i)=>c.fillText(ln,s.x+PAD,s.y+PAD*0.6+i*lineH));
  }
}

function getBoardState(){

function loadBoardState(state){
  if(!state||state.v!==1) return false;
  elements=state.elements||[]; playerCnt=state.playerCnt||{ct:1,t:1}; waypointCnt=state.waypointCnt||1;
  waypointColorCnt={yellow:1,blue:1,green:1,red:1,purple:1,white:1};
  elements.filter(e=>e.type==='waypoint').forEach(e=>{const c=e.wcolor||'yellow';if(waypointColorCnt[c]<=e.num)waypointColorCnt[c]=e.num+1;});
  document.getElementById('sname').value=state.name||'';
  document.getElementById('mob-sname').value=state.name||'';
  getNotesEditor().innerHTML=state.notes||'';
  document.getElementById('mob-notes-ta').value=stripHtml(state.notes||'');
  if(state.map&&state.map!==currentMap){
    currentMap=state.map;
    document.getElementById('map-sel').value=currentMap;
    document.getElementById('mob-map').value=currentMap;
    loadMap(currentMap);
  }
  selectedEl=null; updateSidebar(null); render(); syncNotesBar();
  return true;
}

═══════════════════════════════════════════ */
function encodeState(s){
  try{return btoa(encodeURIComponent(JSON.stringify(s)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p)));}
  catch(e){return null;}
}
function decodeState(h){
  try{return JSON.parse(decodeURIComponent(Array.from(atob(h),c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join('')));}
  catch(e){return null;}
}
function loadFromURL(){
  const hash=location.hash;
  if(!hash.startsWith('#strat=')) return;
  const state=decodeState(hash.slice(7));
  if(state&&loadBoardState(state)){showToast('Strat loaded from link ✓','success');history.replaceState(null,'',location.pathname);}
  else showToast('Could not load strat from link','error');
}

function openLibrary(){
  const lib=getLibrary(),list=document.getElementById('strat-list');
  if(lib.length===0){list.innerHTML='<div id="no-strats">No strats saved yet.<br>Draw something and hit Save!</div>';}
  else{
    const byMap={};
    lib.forEach(s=>{(byMap[s.map]=byMap[s.map]||[]).push(s);});
    list.innerHTML='';
    for(const [mapKey,strats] of Object.entries(byMap)){

      hdr.style='font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:10px 0 5px;border-bottom:1px solid var(--border);margin-bottom:6px;';
      hdr.textContent=mapName; list.appendChild(hdr);
      strats.forEach(s=>{
        const card=document.createElement('div'); card.className='strat-card';
        const saved=s.savedAt?new Date(s.savedAt).toLocaleDateString():'';
        card.innerHTML=`<div class="strat-card-info"><div class="strat-card-name">${s.name}</div><div class="strat-card-meta">${saved}${s.notes?'  ·  '+stripHtml(s.notes).slice(0,40)+(stripHtml(s.notes).length>40?'…':''):''}</div></div><button class="strat-card-del" title="Delete">🗑</button>`;
        card.querySelector('.strat-card-info').addEventListener('click',()=>{loadBoardState(s);modalBg.classList.remove('open');showToast(`"${s.name}" loaded`,'success');});
        card.querySelector('.strat-card-del').addEventListener('click',ev=>{ev.stopPropagation();if(!confirm(`Delete "${s.name}"?`))return;saveLibrary(getLibrary().filter(x=>!(x.name===s.name&&x.map===s.map)));openLibrary();showToast('Deleted');});

}

document.getElementById('export-book-btn').addEventListener('click',()=>{
  const lib=getLibrary();
  if(!lib.length){showToast('No strats to export','error');return;}
  const book={version:1,exportedAt:Date.now(),exportedBy:'stratboard.app',strats:lib};
  const blob=new Blob([JSON.stringify(book,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.download=`stratbook_${new Date().toISOString().slice(0,10)}.json`;
  a.href=url; a.click(); URL.revokeObjectURL(url);
  showToast(`Exported ${lib.length} strat${lib.length!==1?'s':''}`, 'success');
});
document.getElementById('import-book-btn').addEventListener('click',()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const book=JSON.parse(ev.target.result);
      const incoming=Array.isArray(book)?book:(book.strats||[]);
      if(!incoming.length){showToast('No strats found in file','error');return;}
      const existing=getLibrary();
      const conflicts=[],fresh=[];
      incoming.forEach(s=>{
        const dup=existing.find(e=>e.name===s.name&&e.map===s.map);
        if(dup) conflicts.push({incoming:s,existing:dup}); else fresh.push(s);
      });
      if(fresh.length) saveLibrary([...existing,...fresh]);
      if(!conflicts.length){showToast(`Imported ${fresh.length} strat${fresh.length!==1?'s':''}`, 'success');openLibrary();}
      else showConflictUI(conflicts,fresh.length);
    } catch(err){ showToast('Invalid file','error'); }
    e.target.value='';
  };
  reader.readAsText(file);
});

function showConflictUI(conflicts,freshCount){
  const list=document.getElementById('strat-list');
  list.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:12px">${freshCount} strat${freshCount!==1?'s':''} imported. ${conflicts.length} conflict${conflicts.length!==1?'s':''} — choose:</div>`;
  const pending=new Map();
  conflicts.forEach(c=>{
    const key=c.incoming.name+'__'+c.incoming.map;
    pending.set(key,'keep');
    const mapName=document.querySelector(`#map-sel option[value="${c.incoming.map}"]`)?.textContent||c.incoming.map;
    const card=document.createElement('div'); card.className='conflict-card';
    card.innerHTML=`<div class="conflict-name">${c.incoming.name} <span style="font-size:10px;color:var(--text3)">${mapName}</span></div><div class="conflict-btns"><button class="conflict-btn keep active-choice" data-key="${key}" data-choice="keep">✓ Keep mine</button><button class="conflict-btn replace" data-key="${key}" data-choice="replace">↺ Replace</button></div>`;
    list.appendChild(card);
  });
  list.querySelectorAll('.conflict-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const key=btn.dataset.key; pending.set(key,btn.dataset.choice);
      list.querySelectorAll(`[data-key="${key}"]`).forEach(b=>b.classList.remove('active-choice'));
      btn.classList.add('active-choice');
    });
  });
  const confirmBtn=document.createElement('button');
  confirmBtn.className='modal-action-btn primary'; confirmBtn.style='margin-top:12px;width:100%;height:38px;border-radius:7px';
  confirmBtn.textContent='✓ Confirm Choices';
  confirmBtn.addEventListener('click',()=>{
    const lib=getLibrary();
    conflicts.forEach(c=>{
      if(pending.get(c.incoming.name+'__'+c.incoming.map)==='replace'){
        const idx=lib.findIndex(e=>e.name===c.incoming.name&&e.map===c.incoming.map);
        if(idx>=0) lib[idx]=c.incoming;
      }
    });
    saveLibrary(lib);
    const replaced=Array.from(pending.values()).filter(v=>v==='replace').length;
    showToast(`Done — ${replaced} replaced`,'success'); openLibrary();
  });
  list.appendChild(confirmBtn);
}

}

// ── Font size ───────────────────────────────────────────────────────────────
let currentNotesFontSize='14px';

function applyNotesFontSize(px){
  currentNotesFontSize=px;
  const ed=getNotesEditor();
  ed.focus();
  const sel=window.getSelection();
  if(!sel||!sel.rangeCount) return;
  const range=sel.getRangeAt(0);

  if(!range.collapsed){
    // Selected text: styleWithCSS makes browser emit a span with font-size
    document.execCommand('styleWithCSS',false,true);
    document.execCommand('fontSize',false,px);
    document.execCommand('styleWithCSS',false,false);
    // Clean up any legacy <font size> tags some browsers still emit
    ed.querySelectorAll('font[size]').forEach(f=>{
      f.style.fontSize=px; f.removeAttribute('size');
    });
  } else {
    // Collapsed caret: insert a sized span with a zwsp so caret lands inside it.
    // insertHTML is the one execCommand that reliably works in all contexts
    // including inside <li> elements.
    const html=`<span id="__ntfs" style="font-size:${px}">​</span>`;
    document.execCommand('insertHTML',false,html);
    const injected=ed.querySelector('#__ntfs');
    if(injected){
      injected.removeAttribute('id');
      // Place caret after the zwsp so typing appends normally
      const r=document.createRange();
      r.setStart(injected.firstChild,1);
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    }
  }
  updateNtBtnStates();
}

document.getElementById('nt-fontsize').addEventListener('change',function(){
  applyNotesFontSize(this.value);
});

// List insertion
function docList(cmd){
  const ed=getNotesEditor(); ed.focus();
  document.execCommand(cmd,false,null);
  // Wrap each new li's content in a sized span
  ed.querySelectorAll('li').forEach(li=>{
    if(li.querySelector('span[style*="font-size"]')) return;
    const html=li.innerHTML||'​';
    li.innerHTML=`<span style="font-size:${currentNotesFontSize}">${html}</span>`;
  });
  // Place caret inside the last li
  const lis=ed.querySelectorAll('li');
  if(lis.length){
    const sp=lis[lis.length-1].querySelector('span')||lis[lis.length-1];
    const r=document.createRange();
    r.selectNodeContents(sp); r.collapse(false);
    const sel=window.getSelection();
    sel.removeAllRanges(); sel.addRange(r);
  }
  updateNtBtnStates();
}


// Update toolbar button active states on selection change
function updateNtBtnStates(){
  document.getElementById('nt-bold').classList.toggle('active',document.queryCommandState('bold'));
  document.getElementById('nt-italic').classList.toggle('active',document.queryCommandState('italic'));
  document.getElementById('nt-underline').classList.toggle('active',document.queryCommandState('underline'));
  document.getElementById('nt-ul').classList.toggle('active',document.queryCommandState('insertUnorderedList'));
  document.getElementById('nt-ol').classList.toggle('active',document.queryCommandState('insertOrderedList'));
}
const notesEd=getNotesEditor();
notesEd.addEventListener('keyup',updateNtBtnStates);
notesEd.addEventListener('mouseup',updateNtBtnStates);
notesEd.addEventListener('focus',updateNtBtnStates);
// Prevent toolbar buttons from stealing focus from editor
document.getElementById('notes-toolbar').addEventListener('mousedown',e=>{
  if(e.target.tagName!=='SELECT') e.preventDefault();
});

/* ── Confirm dialog ─────────────────────────────────────────────────────── */
let _confirmCallback=null;
function showConfirm(title,body,onOk){
  _confirmCallback=onOk;
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-body').textContent=body;
  const bg=document.getElementById('confirm-bg');
  bg.style.display='flex';
}
document.getElementById('confirm-cancel').addEventListener('click',()=>{
  document.getElementById('confirm-bg').style.display='none';
  _confirmCallback=null;
});
document.getElementById('confirm-ok').addEventListener('click',()=>{
  document.getElementById('confirm-bg').style.display='none';
  if(_confirmCallback){ _confirmCallback(); _confirmCallback=null; }
});
document.getElementById('confirm-bg').addEventListener('click',e=>{
  if(e.target.id==='confirm-bg'){
    document.getElementById('confirm-bg').style.display='none';
    _confirmCallback=null;
  }
});

loadMap(currentMap);
