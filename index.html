<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* ── Palette ── */
:root{
  --bg0:#0d0f14;
  --bg1:#13161f;
  --bg2:#1a1e2b;
  --bg3:#222736;
  --border:#2a2f42;
  --border2:#353b52;
  --text1:#e8eaf0;
  --text2:#9ba0b4;
  --text3:#5a6080;
  --accent:#e8c840;
  --accent-dim:#27240d;
  --red:#e05060;
}

body{background:var(--bg0);color:var(--text1)}

/* ── Global tooltip ── */
#tooltip{
  position:fixed;z-index:9999;pointer-events:none;
  background:#0a0c12;border:1px solid var(--border2);
  border-radius:6px;padding:5px 10px;
  font-size:12px;color:var(--text1);white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  opacity:0;transition:opacity .15s;
}
#tooltip.show{opacity:1}

/* ── App shell ── */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* ── Left tool panel ── */
#toolpanel{
  width:72px;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0;gap:2px;overflow-y:auto;overflow-x:visible;flex-shrink:0;
}
.tp-section{
  width:100%;padding:6px 0 4px;display:flex;flex-direction:column;align-items:center;gap:3px;
}
.tp-label{
  font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:2px;
}
.tp-sep{width:44px;height:1px;background:var(--border);margin:4px 0;flex-shrink:0}
.tb-btn{
  width:46px;height:46px;border-radius:8px;border:1.5px solid transparent;
  background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;position:relative;user-select:none;color:var(--text2);flex-shrink:0;
  transition:background .12s,border-color .12s;
}
.tb-btn:hover{background:var(--bg3);border-color:var(--border2);color:var(--text1)}
.tb-btn.active{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
.tb-btn svg{pointer-events:none}

/* ── Main area ── */
#main{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ── Top bar ── */
#topbar{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--bg1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
#sname{
  background:var(--bg2);color:var(--accent);border:1px solid #2e2a00;
  border-radius:8px;padding:6px 10px;font-size:13px;font-weight:600;
  width:160px;height:38px;outline:none;
}
#sname:focus{border-color:var(--accent)}
#map-sel{
  background:var(--bg2);color:var(--text1);border:1px solid var(--border2);
  border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;height:38px;outline:none;
}
.tsep{width:1px;height:28px;background:var(--border);flex-shrink:0}
.top-btn{
  height:38px;padding:0 12px;border-radius:8px;border:1px solid var(--border2);
  background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;
  display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background .1s,color .1s;
}
.top-btn:hover{background:var(--bg3);color:var(--text1)}
.top-btn.accent{border-color:#2a5a2a;color:#60cc60}
#zoom-input{
  width:64px;height:38px;background:var(--bg2);color:var(--text1);
  border:1px solid var(--border2);border-radius:8px;
  font-size:13px;text-align:center;outline:none;padding:0 6px;
  -moz-appearance:textfield;
}
#zoom-input::-webkit-outer-spin-button,
#zoom-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#zoom-input:focus{border-color:var(--accent);color:var(--accent)}

/* ── Board ── */
#board{display:flex;flex:1;overflow:hidden;min-height:0}
#cvwrap{flex:1;position:relative;overflow:hidden}
#cv{position:absolute;top:0;left:0;display:block}

/* ── Notes bar below canvas ── */
#notes-bar{
  background:var(--bg1);border-top:1px solid var(--border);
  padding:10px 16px;flex-shrink:0;display:flex;align-items:flex-start;gap:12px;
  min-height:42px;max-height:150px;overflow-y:auto;
}
#notes-label{
  font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:.1em;padding-top:3px;white-space:nowrap;flex-shrink:0;
}
#notes-display{
  font-size:12px;color:var(--text2);line-height:1.6;
  flex:1;white-space:pre-wrap;word-break:break-word;
}
#notes-display.empty{color:var(--text3);font-style:italic;}

/* ── Right sidebar ── */
#sidebar{
  width:200px;background:var(--bg1);border-left:1px solid var(--border);
  padding:12px 10px;display:flex;flex-direction:column;gap:10px;
  overflow-y:auto;flex-shrink:0;
}
.s-lbl{
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;
  padding-bottom:5px;border-bottom:1px solid var(--border);
  margin-bottom:2px;
}
.color-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.c-dot,.pc-global{
  width:20px;height:20px;border-radius:50%;
  border:2px solid transparent;cursor:pointer;flex-shrink:0;
  transition:transform .1s,border-color .1s;
}
.c-dot:hover,.pc-global:hover{transform:scale(1.18)}
.c-dot.active,.pc-global.active{border-color:#fff}
#notes{
  width:100%;background:var(--bg2);color:var(--text1);
  border:1px solid var(--border2);border-radius:8px;
  padding:8px 9px;font-size:12px;resize:none;font-family:inherit;
  min-height:90px;outline:none;line-height:1.5;
}
#notes:focus{border-color:var(--border2)}
#notes::placeholder{color:var(--text3)}
#sel-info{font-size:11px;color:var(--text3);min-height:32px}
.si-row{display:flex;justify-content:space-between;margin:3px 0;font-size:11px;color:var(--text2)}
.si-row span{color:var(--text1)}
.del-btn{
  width:100%;background:#200808;color:var(--red);
  border:1px solid #3a1414;border-radius:7px;
  padding:6px;font-size:11px;cursor:pointer;margin-top:4px;
  transition:background .1s;
}
.del-btn:hover{background:#2e0e0e}
.act-row{display:flex;gap:6px}
.a-btn{
  flex:1;background:var(--bg2);border:1px solid var(--border2);
  color:var(--text2);border-radius:7px;padding:7px 4px;font-size:11px;cursor:pointer;
  transition:background .1s,color .1s;
}
.a-btn:hover{background:var(--bg3);color:var(--text1)}
.a-btn.wide{flex:none;width:100%;font-size:12px;padding:8px}
#map-status{font-size:10px;color:var(--text3);text-align:center}

/* ── Toast ── */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(64px);
  background:var(--bg2);border:1px solid var(--border2);border-radius:9px;
  padding:10px 22px;font-size:13px;color:var(--text1);
  transition:transform .25s ease,opacity .25s ease;opacity:0;z-index:1000;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.success{border-color:#1e4a1e;color:#60cc60}
#toast.error{border-color:#4a1414;color:#e07070}

/* ── Library modal ── */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
#modal{
  background:var(--bg1);border:1px solid var(--border2);border-radius:12px;
  width:500px;max-width:96vw;max-height:82vh;display:flex;flex-direction:column;overflow:hidden;
}
#modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);
}
#modal-header h2{font-size:15px;font-weight:600;color:var(--text1)}
#modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:22px;line-height:1}
#modal-close:hover{color:var(--text1)}
#modal-body{padding:14px 18px;overflow-y:auto;flex:1}
#strat-list{display:flex;flex-direction:column;gap:8px}
.strat-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;
  transition:background .1s,border-color .1s;
}
.strat-card:hover{background:var(--bg3);border-color:var(--border2)}
.strat-card-info{flex:1}
.strat-card-name{font-size:13px;font-weight:600;color:var(--text1)}
.strat-card-meta{font-size:10px;color:var(--text3);margin-top:2px}
.strat-card-del{background:none;border:none;color:#3a1414;cursor:pointer;font-size:17px;padding:4px}
.strat-card-del:hover{color:var(--red)}
#no-strats{color:var(--text3);font-size:12px;text-align:center;padding:28px 0}
#modal-actions{display:flex;gap:8px;padding:10px 18px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg1)}
.modal-action-btn{flex:1;height:34px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .1s,color .1s}
.modal-action-btn:hover{background:var(--bg3);color:var(--text1)}
.modal-action-btn.primary{border-color:#1e4a1e;color:#60cc60}
.modal-action-btn.primary:hover{background:#0e2a0e}
.conflict-card{background:var(--bg2);border:1px solid var(--border2);border-radius:7px;padding:10px 12px;margin-bottom:8px}
.conflict-name{font-size:13px;font-weight:600;color:var(--text1);margin-bottom:6px}
.conflict-btns{display:flex;gap:6px}
.conflict-btn{flex:1;padding:5px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer}
.conflict-btn:hover{color:var(--text1)}
.conflict-btn.keep{border-color:#1e4a1e;color:#60cc60}
.conflict-btn.replace{border-color:#4a1414;color:#e07070}
.conflict-btn.keep:hover{background:#0e2a0e}
.conflict-btn.replace:hover{background:#2a0e0e}
#import-file{display:none}

/* ══════════════════════════════════════════
   MOBILE  (≤ 768px)
══════════════════════════════════════════ */
@media (max-width: 768px){

  /* Hide desktop elements */
  #toolpanel { display:none; }
  #sidebar   { display:none; }
  #topbar    { display:none; }
  #notes-bar { display:none; }

  /* App becomes column: canvas fills screen, mobile bar at bottom */
  #app    { flex-direction:column; height:100vh; height:100dvh; }
  #main   { flex:1; overflow:hidden; display:flex; flex-direction:column; min-height:0; }
  #board  { flex:1; overflow:hidden; min-height:0; }
  #cvwrap { flex:1; position:relative; overflow:hidden; }

  /* ── Mobile top strip: name + map ── */
  #mob-top{
    display:flex; align-items:center; gap:6px;
    padding:6px 10px; background:var(--bg1);
    border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap;
  }
  #mob-sname{
    flex:1; min-width:0;

/* ═══════════════════════════════════════════
   GLOBAL TOOLTIP ENGINE
   Uses data-tip attributes — works everywhere,
   no clipping from overflow:hidden parents.
═══════════════════════════════════════════ */
const ttEl = document.getElementById('tooltip');
let ttTimer = null;

function showTip(text, targetEl) {
  clearTimeout(ttTimer);
  const r = targetEl.getBoundingClientRect();
  ttEl.textContent = text;
  ttEl.classList.remove('show');

  // Position: prefer below for top-bar elements, right for left-panel buttons
  const inPanel = targetEl.closest('#toolpanel');
  if (inPanel) {
    // Right of the button
    ttEl.style.left = (r.right + 10) + 'px';
    ttEl.style.top  = (r.top + r.height / 2) + 'px';
    ttEl.style.transform = 'translateY(-50%)';
  } else {
    // Below the element
    ttEl.style.left = (r.left + r.width / 2) + 'px';
    ttEl.style.top  = (r.bottom + 8) + 'px';
    ttEl.style.transform = 'translateX(-50%)';
  }

  ttTimer = setTimeout(() => ttEl.classList.add('show'), 400);
}

function hideTip() {
  clearTimeout(ttTimer);
  ttEl.classList.remove('show');
}

document.addEventListener('mouseover', e => {
  const el = e.target.closest('[data-tip]');
  if (el) showTip(el.dataset.tip, el);
});
document.addEventListener('mouseout', e => {
  const el = e.target.closest('[data-tip]');
  if (el) hideTip();
});
document.addEventListener('mousedown', hideTip);
document.addEventListener('scroll', hideTip, true);

/* ═══════════════════════════════════════════

let elements=[],selectedEl=null,undoStack=[];

let currentWaypointColor='yellow';
let waypointColorCnt={yellow:1,blue:1,green:1,red:1,purple:1,white:1};

let vx=0,vy=0,vz=1;
const MIN_Z=0.3,MAX_Z=8;
let isPanning=false,panStart=null,panOrigin=null,spaceDown=false;
let isDragging=false,dragOffset={x:0,y:0};
let isDrawing=false,drawPath=[];

/* ═══════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════ */
function resize(){
  W=wrap.offsetWidth; H=wrap.offsetHeight;
  cv.width=W; cv.height=H; render();
}
window.addEventListener('resize',resize);

/* ═══════════════════════════════════════════
   MAP
═══════════════════════════════════════════ */
function loadMap(key){
  if(mapImages[key]){mapLoaded=true;fitMap();return;}
  mapLoaded=false; setStatus('Loading map...');
  const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>{mapImages[key]=img;mapLoaded=true;setStatus('');fitMap();};
  img.onerror=()=>{setStatus('Map failed to load');render();};
  img.src=MAP_URLS[key];
}
function setStatus(m){document.getElementById('map-status').textContent=m;}
function fitMap(){
  if(!mapImages[currentMap]){render();return;}
  const img=mapImages[currentMap];
  vz=1; vx=(W-img.width)/2; vy=(H-img.height)/2;
  updateZoomUI(); render();
}

/* ═══════════════════════════════════════════
   COORDS
═══════════════════════════════════════════ */
function toScreen(wx,wy){return{x:vx+wx*vz,y:vy+wy*vz};}
function toWorld(sx,sy){return{x:(sx-vx)/vz,y:(sy-vy)/vz};}

/* ═══════════════════════════════════════════
   ZOOM
═══════════════════════════════════════════ */
function zoomAt(sx,sy,factor){
  const nz=Math.min(MAX_Z,Math.max(MIN_Z,vz*factor));
  const r=nz/vz; vx=sx-(sx-vx)*r; vy=sy-(sy-vy)*r; vz=nz;
  updateZoomUI(); render();
}
function updateZoomUI(){
  const inp=document.getElementById('zoom-input');
  // Only update if user isn't currently typing in the field
  if(document.activeElement!==inp) inp.value=Math.round(vz*100);
}
document.getElementById('zoom-reset-btn').onclick=fitMap;

// Zoom input — apply on Enter or blur
const zoomInp=document.getElementById('zoom-input');
function applyZoomInput(){
  let val=parseInt(zoomInp.value,10);
  if(isNaN(val)||val<=0) val=Math.round(vz*100);
  val=Math.min(800,Math.max(30,val));
  zoomInp.value=val;
  const newZ=val/100;
  // Zoom toward canvas centre
  const cx=W/2, cy=H/2;
  vx=cx-(cx-vx)*(newZ/vz);
  vy=cy-(cy-vy)*(newZ/vz);
  vz=newZ;
  updateZoomUI(); render();
}
zoomInp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){applyZoomInput();zoomInp.blur();e.preventDefault();return;}
  // Only block plain keys — let Ctrl/Cmd combos (Ctrl+Z, Ctrl+S etc.) bubble normally
  if(!e.ctrlKey&&!e.metaKey) e.stopPropagation();
});
zoomInp.addEventListener('blur',applyZoomInput);
zoomInp.addEventListener('focus',()=>zoomInp.select());
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.05:1/1.05);
},{passive:false});

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function render(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0f14'; ctx.fillRect(0,0,W,H);
  if(mapLoaded&&mapImages[currentMap]){
    const img=mapImages[currentMap];
    ctx.drawImage(img,vx,vy,img.width*vz,img.height*vz);
  } else {
    ctx.fillStyle='#13161f'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#444'; ctx.font='14px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Loading map radar...',W/2,H/2);
  }
  for(const el of elements) drawEl(el,el===selectedEl);
  if(isDrawing&&drawPath.length>1){
    ctx.strokeStyle=currentColor; ctx.lineWidth=2.5;
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.setLineDash([5,4]);
    ctx.beginPath();
    const p0=toScreen(drawPath[0].x,drawPath[0].y); ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<drawPath.length;i++){const p=toScreen(drawPath[i].x,drawPath[i].y);ctx.lineTo(p.x,p.y);}
    ctx.stroke(); ctx.setLineDash([]);
    if(currentTool==='arrow'&&drawPath.length>=2){
      const pa=toScreen(drawPath[drawPath.length-2].x,drawPath[drawPath.length-2].y);
      const pb=toScreen(drawPath[drawPath.length-1].x,drawPath[drawPath.length-1].y);
      arrowHead(pa,pb,currentColor);
    }
  }
  if(isPanning) cv.style.cursor='grabbing';
  else if(currentTool==='pan'||spaceDown) cv.style.cursor='grab';
  else if(currentTool==='select') cv.style.cursor='default';
  else cv.style.cursor='crosshair';
}

function arrowHead(from,to,color,size=13){
  const a=Math.atan2(to.y-from.y,to.x-from.x);
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(to.x,to.y);
  ctx.lineTo(to.x-size*Math.cos(a-0.4),to.y-size*Math.sin(a-0.4));
  ctx.lineTo(to.x-size*Math.cos(a+0.4),to.y-size*Math.sin(a+0.4));
  ctx.closePath(); ctx.fill();
}

function drawEl(el,sel){
  ctx.save();
  if(sel){ctx.shadowColor='#e8c840';ctx.shadowBlur=10;}

  if(el.type==='player'){
    const s=toScreen(el.x,el.y),r=Math.max(4,8*Math.min(vz,2));
    const pc=el.enemy?ENEMY_COLOR:(PLAYER_COLORS[el.color]||PLAYER_COLORS.blue);
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
    ctx.fillStyle=pc.fill; ctx.fill();
    ctx.strokeStyle=pc.stroke; ctx.lineWidth=sel?2:1.5; ctx.stroke();


  } else if(el.type==='waypoint'){
    const s=toScreen(el.x,el.y),r=Math.max(7,13*Math.min(vz,2));
    ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2);
    const wc=WAYPOINT_COLORS[el.wcolor]||WAYPOINT_COLORS.yellow;
    ctx.fillStyle=wc.fill; ctx.fill();
    ctx.strokeStyle=wc.stroke; ctx.lineWidth=sel?2.5:2; ctx.stroke();
    ctx.fillStyle=wc.text;
    ctx.font=`bold ${Math.max(7,12*Math.min(vz,2))}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(el.num,s.x,s.y);
    if(sel){ctx.globalAlpha=0.3;ctx.strokeStyle=wc.stroke;ctx.lineWidth=5;ctx.beginPath();ctx.arc(s.x,s.y,r+5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}

  } else if(el.type==='smokezone'){
    const s=toScreen(el.x,el.y),sr=el.r*vz;
    drawSmokeZone(s.x,s.y,sr,sel);

  } else if(el.type==='molotovzone'){
    const s=toScreen(el.x,el.y),sr=el.r*vz;
    drawMolotovZone(s.x,s.y,sr,sel);

  } else if(el.type==='icon'){
    const s=toScreen(el.x,el.y);
    drawIcon(el.icon,s.x,s.y,sel);

  } else if(el.type==='path'){
    if(el.points.length<2){ctx.restore();return;}
    ctx.strokeStyle=el.color||currentColor;
    ctx.lineWidth=sel?3:2.2; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath();
    const p0=toScreen(el.points[0].x,el.points[0].y); ctx.moveTo(p0.x,p0.y);
    for(let i=1;i<el.points.length;i++){const p=toScreen(el.points[i].x,el.points[i].y);ctx.lineTo(p.x,p.y);}
    ctx.stroke();
    if(el.arrow&&el.points.length>=2){
      const pa=toScreen(el.points[el.points.length-2].x,el.points[el.points.length-2].y);
      const pb=toScreen(el.points[el.points.length-1].x,el.points[el.points.length-1].y);
      arrowHead(pa,pb,el.color||currentColor);
    }
    if(sel){
      ctx.strokeStyle='rgba(232,200,64,0.2)'; ctx.lineWidth=8;
      ctx.beginPath();
      const q0=toScreen(el.points[0].x,el.points[0].y); ctx.moveTo(q0.x,q0.y);
      for(let i=1;i<el.points.length;i++){const q=toScreen(el.points[i].x,el.points[i].y);ctx.lineTo(q.x,q.y);}
      ctx.stroke();
    }

  } else if(el.type==='text'){
    const s=toScreen(el.x,el.y);
    const fs=Math.max(9,13*Math.min(vz,2));
    ctx.font=`500 ${fs}px sans-serif`; ctx.textAlign='left'; ctx.textBaseline='top';
    const tw=ctx.measureText(el.text).width;
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(s.x-2,s.y-2,tw+8,fs+6);
    ctx.fillStyle='#fff'; ctx.fillText(el.text,s.x+2,s.y+1);
    if(sel){ctx.strokeStyle='#e8c840';ctx.lineWidth=1;ctx.strokeRect(s.x-3,s.y-3,tw+10,fs+8);}
  }
  ctx.restore();
}

/* ─── Smoke zone ─── */
function drawSmokeZone(sx,sy,sr,sel){
  ctx.save();
  ctx.globalAlpha=0.22;
  ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
  ctx.fillStyle='#b0cce0'; ctx.fill();
  ctx.globalAlpha=0.55;
  ctx.strokeStyle='#c8dff0'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.globalAlpha=0.12;
  ctx.beginPath(); ctx.arc(sx,sy,sr*0.55,0,Math.PI*2);
  ctx.fillStyle='#8ab0cc'; ctx.fill();
  ctx.globalAlpha=1;
  const fs=Math.max(9,Math.min(sr*0.45,16));
  ctx.font=`600 ${fs}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(180,210,230,0.85)'; ctx.fillText('S',sx,sy);
  if(sel){ctx.strokeStyle='rgba(232,200,64,0.6)';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(sx,sy,sr+3,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  ctx.restore();
}

/* ─── Molotov zone ─── */
function drawMolotovZone(sx,sy,sr,sel){
  ctx.save();
  ctx.globalAlpha=0.3;
  ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
  ctx.fillStyle='#d04010'; ctx.fill();
  ctx.globalAlpha=0.6;
  ctx.strokeStyle='#ff7030'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.globalAlpha=0.25;
  ctx.beginPath(); ctx.arc(sx,sy,sr*0.5,0,Math.PI*2);
  ctx.fillStyle='#ffcc00'; ctx.fill();
  ctx.globalAlpha=1;
  drawFlamePath(sx,sy,Math.max(7,Math.min(sr*0.45,20)));
  if(sel){ctx.strokeStyle='rgba(232,200,64,0.6)';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(sx,sy,sr+3,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  ctx.restore();
}

function drawFlamePath(cx,cy,size){
  ctx.save();
  ctx.translate(cx,cy+size*0.3);
  ctx.beginPath();
  ctx.moveTo(0,-size);
  ctx.bezierCurveTo(size*0.6,-size*0.5,size*0.5,size*0.3,0,size*0.4);
  ctx.bezierCurveTo(-size*0.5,size*0.3,-size*0.6,-size*0.5,0,-size);
  ctx.closePath();
  const g1=ctx.createLinearGradient(0,-size,0,size*0.4);
  g1.addColorStop(0,'rgba(255,200,0,0.95)');
  g1.addColorStop(0.5,'rgba(255,80,0,0.9)');
  g1.addColorStop(1,'rgba(180,20,0,0.8)');
  ctx.fillStyle=g1; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0,-size*0.4);
  ctx.bezierCurveTo(size*0.25,-size*0.1,size*0.2,size*0.2,0,size*0.3);
  ctx.bezierCurveTo(-size*0.2,size*0.2,-size*0.25,-size*0.1,0,-size*0.4);
  ctx.closePath();
  const g2=ctx.createLinearGradient(0,-size*0.4,0,size*0.3);
  g2.addColorStop(0,'rgba(255,240,180,0.9)');
  g2.addColorStop(1,'rgba(255,160,0,0.7)');
  ctx.fillStyle=g2; ctx.fill();
  ctx.restore();
}

/* ─── Icon router ─── */
function drawIcon(icon,sx,sy,sel){
  const baseR=Math.max(10,16*Math.min(vz,2));
  if(icon==='bomb'){ drawBombIcon(sx,sy,baseR*0.75,sel); return; }
  if(icon==='nade'){ drawNadeIcon(sx,sy,baseR,sel); return; }
  if(icon==='sniper'){ drawSniperIcon(sx,sy,sel); return; }
  const EMOJI={flash:'💥'};
  const fs=Math.max(10,16*Math.min(vz,2));
  ctx.font=`${fs}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(EMOJI[icon]||'?',sx,sy);
  if(sel){ctx.strokeStyle='#e8c840';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,baseR+4,0,Math.PI*2);ctx.stroke();}
}

/* ─── AWP Position: same size circle as CT/T with crosshair ─── */
function drawSniperIcon(sx,sy,sel){
  const r=Math.max(4,8*Math.min(vz,2));
  ctx.save();
  // Outer ring
  ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2);
  ctx.fillStyle='#2e0a0a'; ctx.fill();
  ctx.strokeStyle='#dd2222'; ctx.lineWidth=sel?2:1.5; ctx.stroke();
  // Crosshair lines
  const lw=r*0.55;
  ctx.strokeStyle='rgba(220,60,60,0.9)'; ctx.lineWidth=Math.max(0.8,r*0.18); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(sx-lw,sy); ctx.lineTo(sx+lw,sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy-lw); ctx.lineTo(sx,sy+lw); ctx.stroke();
  // Centre dot
  ctx.beginPath(); ctx.arc(sx,sy,Math.max(1,r*0.22),0,Math.PI*2);
  ctx.fillStyle='#dd2222'; ctx.fill();
  if(sel){ctx.shadowColor='#e8c840';ctx.shadowBlur=10;ctx.strokeStyle='#e8c840';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,r+4,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

/* ─── Bomb ─── */
function drawBombIcon(sx,sy,r,sel){
  ctx.save();
  ctx.beginPath(); ctx.arc(sx,sy+r*0.1,r*0.85,0,Math.PI*2);
  ctx.fillStyle='#222'; ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=1.4; ctx.stroke();
  ctx.beginPath(); ctx.arc(sx-r*0.25,sy-r*0.35,r*0.25,0,Math.PI*2);
  ctx.fillStyle='#444'; ctx.fill();
  ctx.strokeStyle='#777'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy-r*0.85); ctx.lineTo(sx,sy-r*1.4);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=Math.max(1,r*0.12); ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy-r*1.4);
  ctx.bezierCurveTo(sx+r*0.4,sy-r*1.6,sx+r*0.8,sy-r*1.3,sx+r*1.0,sy-r*1.05);
  ctx.strokeStyle='#e8c840'; ctx.lineWidth=Math.max(1,r*0.1); ctx.stroke();
  ctx.beginPath(); ctx.arc(sx+r*1.0,sy-r*1.05,r*0.2,0,Math.PI*2);
  ctx.fillStyle='#ffe060'; ctx.fill();
  ctx.beginPath(); ctx.arc(sx-r*0.3,sy-r*0.2,r*0.2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();
  if(sel){ctx.shadowColor='#e8c840';ctx.shadowBlur=10;ctx.strokeStyle='#e8c840';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy+r*0.1,r+4,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

/* ─── HE Grenade ─── */
function drawNadeIcon(sx,sy,r,sel){
  ctx.save();
  ctx.beginPath(); ctx.ellipse(sx,sy+r*0.05,r*0.72,r*0.85,0,0,Math.PI*2);
  ctx.fillStyle='#2a4a1a'; ctx.fill();
  ctx.strokeStyle='#7acc55'; ctx.lineWidth=1.3; ctx.stroke();
  ctx.strokeStyle='rgba(80,160,40,0.5)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(sx-r*0.72,sy+r*0.05); ctx.lineTo(sx+r*0.72,sy+r*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx,sy-r*0.8); ctx.lineTo(sx,sy+r*0.9); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(sx-r*0.22,sy-r*1.1,r*0.44,r*0.35,r*0.1);
  ctx.fillStyle='#555'; ctx.fill();
  ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.stroke();
  ctx.beginPath(); ctx.arc(sx-r*0.55,sy-r*1.0,r*0.17,0,Math.PI*2);
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1.1; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(sx-r*0.38,sy-r*1.0); ctx.lineTo(sx+r*0.22,sy-r*1.0);
  ctx.strokeStyle='#aaa'; ctx.lineWidth=1.1; ctx.lineCap='round'; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(sx-r*0.22,sy-r*0.3,r*0.18,r*0.28,Math.PI*0.3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.09)'; ctx.fill();
  if(sel){ctx.strokeStyle='#e8c840';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,r+4,0,Math.PI*2);ctx.stroke();}
  ctx.restore();
}

/* ═══════════════════════════════════════════
   HIT TESTING
═══════════════════════════════════════════ */
function getPos(e){
  const r=cv.getBoundingClientRect();
  const cl=e.touches?e.touches[0]:e;
  return{x:cl.clientX-r.left,y:cl.clientY-r.top};
}
function distToSeg(pw,aw,bw){
  const dx=bw.x-aw.x,dy=bw.y-aw.y,len2=dx*dx+dy*dy;
  const t=len2?Math.max(0,Math.min(1,((pw.x-aw.x)*dx+(pw.y-aw.y)*dy)/len2)):0;
  return Math.hypot(pw.x-aw.x-t*dx,pw.y-aw.y-t*dy);
}
function hitTest(spos){
  const wp=toWorld(spos.x,spos.y);
  const tol=Math.max(14,22/vz);
  for(let i=elements.length-1;i>=0;i--){
    const el=elements[i];
    if(el.type==='player'||el.type==='icon'||el.type==='waypoint'){
      if(Math.hypot(wp.x-el.x,wp.y-el.y)<tol) return el;
    } else if(el.type==='smokezone'||el.type==='molotovzone'){
      if(Math.hypot(wp.x-el.x,wp.y-el.y)<el.r+tol) return el;
    } else if(el.type==='text'){
      const s=toScreen(el.x,el.y);
      const fs=Math.max(9,13*Math.min(vz,2));
      ctx.font=`500 ${fs}px sans-serif`;
      const tw=ctx.measureText(el.text).width;
      if(spos.x>=s.x-3&&spos.x<=s.x+tw+7&&spos.y>=s.y-3&&spos.y<=s.y+fs+8) return el;
    } else if(el.type==='path'){
      const stol=10/vz;
      for(let j=0;j<el.points.length-1;j++)
        if(distToSeg(wp,el.points[j],el.points[j+1])<stol) return el;
    }
  }
  return null;
}

/* ═══════════════════════════════════════════
   UNDO
═══════════════════════════════════════════ */
function pushUndo(){undoStack.push(JSON.stringify(elements));if(undoStack.length>50)undoStack.shift();}
function undo(){if(undoStack.length){elements=JSON.parse(undoStack.pop());selectedEl=null;updateSidebar(null);render();}}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
function updateSidebar(el){
  const info=document.getElementById('sel-info');
  if(!el){info.innerHTML='<span style="color:var(--text3)">Click an element to select</span>';return;}
  let h='';
  if(el.type==='player'){
    if(el.enemy){
      h=`<div class="si-row">Type: <span>Enemy</span></div>`;
    } else {
      h=`<div class="si-row">Type: <span>Teammate</span></div>`;
      h+=`<div style="margin-top:6px;font-size:10px;color:var(--text3);margin-bottom:5px">Player color</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
      PLAYER_COLOR_KEYS.forEach(k=>{
        const active=(el.color||'blue')===k;
        h+=`<div class="pc-swatch${active?' pc-active':''}" data-pcolor="${k}" style="width:20px;height:20px;border-radius:50%;background:${PC_HEX[k]};border:2px solid ${active?'#fff':'transparent'};cursor:pointer;flex-shrink:0;transition:transform .1s"></div>`;
      });
      h+='</div>';
    }
  } else if(el.type==='waypoint'){
    h=`<div class="si-row">Type: <span>Waypoint</span></div><div class="si-row">Number: <span>${el.num}</span></div>`;
    h+=`<div style="margin-top:6px;font-size:10px;color:var(--text3);margin-bottom:5px">Waypoint color</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
    WAYPOINT_COLOR_KEYS.forEach(k=>{
      const active=(el.wcolor||'yellow')===k;
      h+=`<div class="wc-swatch" data-wcolor="${k}" style="width:20px;height:20px;border-radius:50%;background:${WC_HEX[k]};border:2px solid ${active?'#fff':'transparent'};cursor:pointer;flex-shrink:0"></div>`;
    });
    h+='</div>';
  } else if(el.type==='smokezone'){
    h=`<div class="si-row">Type: <span>Smoke Zone</span></div>`;
  } else if(el.type==='molotovzone'){
    h=`<div class="si-row">Type: <span>Molotov Zone</span></div>`;
  } else if(el.type==='icon'){
    h=`<div class="si-row">Type: <span>${el.icon.charAt(0).toUpperCase()+el.icon.slice(1)}</span></div>`;
  } else if(el.type==='path'){

// ── Touch handling ──
// Mobile: single finger pans map unless a draw/place tool is active.
// Two fingers always pinch-zoom.
let touchPanStart=null, touchPanOrigin=null;
let pinchStartDist=0, pinchStartZ=0, pinchMidX=0, pinchMidY=0;
let touchDrawing=false;

const DRAW_TOOLS=new Set(['draw','arrow','text','waypoint','smokezone','molotovzone',
  'teammate','enemy','bomb','flash','nade','sniper']);

function touchDist(t){ return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY); }
function touchMid(t,r){ return {x:(t[0].clientX+t[1].clientX)/2-r.left, y:(t[0].clientY+t[1].clientY)/2-r.top}; }

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  if(e.touches.length===2){
    // Pinch-zoom start
    touchPanStart=null; touchDrawing=false; isDrawing=false;
    pinchStartDist=touchDist(e.touches);
    pinchStartZ=vz;
    const m=touchMid(e.touches,r);
    pinchMidX=m.x; pinchMidY=m.y;
    touchPanOrigin={x:vx,y:vy};
  } else if(e.touches.length===1){
    const t=e.touches[0];
    const spos={x:t.clientX-r.left,y:t.clientY-r.top};
    if(DRAW_TOOLS.has(currentTool)){
      // Use existing onDown for placement/drawing tools
      touchDrawing=true;
      onDown({button:0,clientX:t.clientX,clientY:t.clientY,touches:e.touches});
    } else {
      // Pan by default
      touchPanStart=spos; touchPanOrigin={x:vx,y:vy};
    }
  }
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  if(e.touches.length===2){
    // Pinch-zoom + pan
    const d=touchDist(e.touches);
    const newZ=Math.min(8,Math.max(0.3,pinchStartZ*(d/pinchStartDist)));
    const m=touchMid(e.touches,r);
    // Apply zoom centred on pinch midpoint
    const ratio=newZ/vz;
    vx=pinchMidX-(pinchMidX-touchPanOrigin.x)*ratio*(newZ/pinchStartZ);
    vy=pinchMidY-(pinchMidY-touchPanOrigin.y)*ratio*(newZ/pinchStartZ);
    vz=newZ;
    updateZoomUI(); render();
  } else if(e.touches.length===1){
    const t=e.touches[0];
    if(touchDrawing){
      onMove({clientX:t.clientX,clientY:t.clientY,touches:e.touches});
    } else if(touchPanStart){
      const spos={x:t.clientX-r.left,y:t.clientY-r.top};
      vx=touchPanOrigin.x+(spos.x-touchPanStart.x);
      vy=touchPanOrigin.y+(spos.y-touchPanStart.y);
      render();
    }
  }
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(touchDrawing){ onUp({}); touchDrawing=false; }
  touchPanStart=null;
  if(e.touches.length<2){ pinchStartDist=0; }
},{passive:false});

let middleDown=false;
function isPanMode(){return spaceDown||(middleDown&&!isDragging);}

function onDown(e){
  if(e.button===2) return; // right-click handled by contextmenu
  if(e.button===1){
    e.preventDefault();
    middleDown=true;
    const spos=getPos(e);
    const wpos=toWorld(spos.x,spos.y);
    const hit=hitTest(spos);
    if(hit){
      selectedEl=hit; isDragging=true;
      if(hit.type==='path') dragOffset={x:wpos.x-hit.points[0].x,y:wpos.y-hit.points[0].y};
      else dragOffset={x:wpos.x-hit.x,y:wpos.y-hit.y};
      updateSidebar(hit);
    } else {
      isPanning=true; panStart=spos; panOrigin={x:vx,y:vy};
    }
    render(); return;
  }
  const spos=getPos(e);
  const wpos=toWorld(spos.x,spos.y);
  if(isPanMode()){isPanning=true;panStart=spos;panOrigin={x:vx,y:vy};render();return;}
  if(currentTool==='select'){
    selectedEl=hitTest(spos);
    if(selectedEl){
      isDragging=true;
      if(selectedEl.type==='path') dragOffset={x:wpos.x-selectedEl.points[0].x,y:wpos.y-selectedEl.points[0].y};
      else dragOffset={x:wpos.x-selectedEl.x,y:wpos.y-selectedEl.y};
    }
    updateSidebar(selectedEl);render();
  } else if(currentTool==='draw'||currentTool==='arrow'){
    isDrawing=true;drawPath=[wpos];
  } else if(currentTool==='smokezone'||currentTool==='molotovzone'){
    pushUndo();
    const r=currentTool==='smokezone'?smokeRadiusPx():molotovRadiusPx();
    elements.push({type:currentTool,x:wpos.x,y:wpos.y,r});render();
  } else if(currentTool==='text'){
    const txt=prompt('Label text:');
    if(txt&&txt.trim()){pushUndo();elements.push({type:'text',x:wpos.x,y:wpos.y,text:txt.trim()});render();}
  } else if(currentTool==='waypoint'){
    pushUndo();
    // Find the next available number for this color by looking at existing elements
    const usedNums=new Set(elements.filter(e=>e.type==='waypoint'&&e.wcolor===currentWaypointColor).map(e=>e.num));
    let wnum=1; while(usedNums.has(wnum)) wnum++;
    elements.push({type:'waypoint',x:wpos.x,y:wpos.y,num:wnum,wcolor:currentWaypointColor});
    render();
  } else {
    pushUndo();
    if(currentTool==='teammate'){
      elements.push({type:'player',x:wpos.x,y:wpos.y,team:'teammate',enemy:false,color:currentPlayerColor});
    } else if(currentTool==='enemy'){
      elements.push({type:'player',x:wpos.x,y:wpos.y,team:'enemy',enemy:true,color:'grey'});
    } else {
      elements.push({type:'icon',x:wpos.x,y:wpos.y,icon:currentTool});
    }
    render();
  }
}

function onMove(e){
  const spos=getPos(e);
  const wpos=toWorld(spos.x,spos.y);
  if(isPanning&&panStart){vx=panOrigin.x+(spos.x-panStart.x);vy=panOrigin.y+(spos.y-panStart.y);render();return;}
  if(isDragging&&selectedEl){
    if(selectedEl.type==='path'){
      const bx=selectedEl.points[0].x,by=selectedEl.points[0].y;
      const dx=wpos.x-dragOffset.x-bx,dy=wpos.y-dragOffset.y-by;
      selectedEl.points=selectedEl.points.map(p=>({x:p.x+dx,y:p.y+dy}));
      dragOffset={x:wpos.x-selectedEl.points[0].x,y:wpos.y-selectedEl.points[0].y};
    } else {selectedEl.x=wpos.x-dragOffset.x;selectedEl.y=wpos.y-dragOffset.y;}
    render();
  } else if(isDrawing){
    const last=drawPath[drawPath.length-1];
    if(Math.hypot(wpos.x-last.x,wpos.y-last.y)>4/vz){drawPath.push(wpos);render();}
  }
}

function onUp(e){
  if(e&&e.button===1){
    middleDown=false;
    if(isDragging){isDragging=false;}
    if(isPanning){isPanning=false;}
    render(); return;
  }
  if(isPanning){isPanning=false;render();return;}
  if(isDrawing&&drawPath.length>2){
    pushUndo();
    elements.push({type:'path',points:[...drawPath],color:currentColor,arrow:currentTool==='arrow'});
  }
  isDrawing=false;isDragging=false;drawPath=[];render();
}

/* ═══════════════════════════════════════════
   EXPORT PNG — map + notes panel side by side
═══════════════════════════════════════════ */
document.getElementById('export-btn').addEventListener('click',()=>{
  const notes=document.getElementById('notes').value.trim();
  const stratName=document.getElementById('sname').value||'strat';
  const mapName=(document.querySelector('#map-sel option:checked')||{}).textContent||currentMap;

  // Dimensions
  const NOTES_W=320;
  const PAD=24;
  const totalW=notes?W+NOTES_W:W;
  const totalH=H;

  const offscreen=document.createElement('canvas');
  offscreen.width=totalW;
  offscreen.height=totalH;
  const oc=offscreen.getContext('2d');

  // Copy the existing canvas (map + elements)
  oc.drawImage(cv,0,0);

  if(notes){
    // Notes panel background
    oc.fillStyle='#13161f';
    oc.fillRect(W,0,NOTES_W,totalH);
    // Left border
    oc.fillStyle='#2a2f42';
    oc.fillRect(W,0,1,totalH);

    // Header: strat name + map
    oc.fillStyle='#e8c840';
    oc.font='bold 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    oc.textAlign='left'; oc.textBaseline='top';
    oc.fillText(stratName,W+PAD,PAD);

    oc.fillStyle='#5a6080';
    oc.font='12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    oc.fillText(mapName,W+PAD,PAD+22);

    // Divider
    oc.fillStyle='#2a2f42';
    oc.fillRect(W+PAD,PAD+40,NOTES_W-PAD*2,1);

    // Notes text — word-wrap
    oc.fillStyle='#c8cad8';
    oc.font='13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    const lineH=20;
    const maxW=NOTES_W-PAD*2;
    let y=PAD+52;
    const words=notes.split(/\n/);
    for(const line of words){
      if(y>totalH-PAD) break;
      if(line.trim()===''){y+=lineH*0.6;continue;}
      // word-wrap each paragraph line
      const tokens=line.split(' ');
      let row='';
      for(const word of tokens){
        const test=row?row+' '+word:word;
        if(oc.measureText(test).width>maxW&&row){
          oc.fillText(row,W+PAD,y); y+=lineH; row=word;
          if(y>totalH-PAD) break;
        } else { row=test; }
      }
      if(row&&y<=totalH-PAD){oc.fillText(row,W+PAD,y);y+=lineH;}
    }
  }

  const link=document.createElement('a');
  link.download=stratName.replace(/\s+/g,'_')+'.png';
  link.href=offscreen.toDataURL('image/png');
  link.click();
  showToast('PNG exported','success');
});

function loadBoardState(state){
  if(!state||state.v!==1) return false;
  elements=state.elements||[];playerCnt=state.playerCnt||{ct:1,t:1};waypointCnt=state.waypointCnt||1;
  waypointColorCnt={yellow:1,blue:1,green:1,red:1,purple:1,white:1};
  elements.filter(e=>e.type==='waypoint').forEach(e=>{const c=e.wcolor||'yellow';if(waypointColorCnt[c]<=e.num)waypointColorCnt[c]=e.num+1;});
  document.getElementById('sname').value=state.name||'';
  document.getElementById('notes').value=state.notes||'';
  if(state.map&&state.map!==currentMap){
    currentMap=state.map;document.getElementById('map-sel').value=currentMap;loadMap(currentMap);
  }
  selectedEl=null;updateSidebar(null);render();
  if(typeof syncNotesBar==='function')syncNotesBar();
  return true;
}

═══════════════════════════════════════════ */
function encodeState(s){
  try{return btoa(encodeURIComponent(JSON.stringify(s)).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p)));}
  catch(e){return null;}
}
function decodeState(h){
  try{return JSON.parse(decodeURIComponent(Array.from(atob(h),c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join('')));}
  catch(e){return null;}
}
document.getElementById('share-btn').addEventListener('click',()=>{
  const encoded=encodeState(getBoardState());
  if(!encoded){showToast('Failed to encode','error');return;}
  const url=location.origin+location.pathname+'#strat='+encoded;
  navigator.clipboard.writeText(url).then(()=>showToast('✅ Share link copied!','success'))
    .catch(()=>prompt('Copy this link:',url));
});
function loadFromURL(){
  const hash=location.hash;
  if(!hash.startsWith('#strat=')) return;
  const state=decodeState(hash.slice(7));
  if(state&&loadBoardState(state)){showToast('✅ Strat loaded from link!','success');history.replaceState(null,'',location.pathname);}
  else showToast('Could not load strat from link','error');
}

// Import — read a .json stratbook file and merge into local library
document.getElementById('import-book-btn').addEventListener('click',()=>{
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const book=JSON.parse(ev.target.result);
      // Accept both bare arrays (old format) and wrapped stratbooks
      const incoming=Array.isArray(book)?book:(book.strats||[]);
      if(!incoming.length){showToast('No strats found in file','error');return;}

      const existing=getLibrary();
      const conflicts=[];
      const fresh=[];

      incoming.forEach(s=>{
        const dup=existing.find(e=>e.name===s.name&&e.map===s.map);
        if(dup) conflicts.push({incoming:s,existing:dup});
        else fresh.push(s);
      });

      // Add all non-conflicting strats immediately
      if(fresh.length){
        const merged=[...existing,...fresh];
        saveLibrary(merged);
      }

      if(conflicts.length===0){
        showToast(`Imported ${fresh.length} strat${fresh.length!==1?'s':''}`, 'success');
        openLibrary();
      } else {
        // Show conflict resolution UI inside the modal
        showConflictUI(conflicts, fresh.length);
      }
    } catch(err){
      showToast('Invalid file — could not read stratbook','error');
    }
    // Reset so same file can be re-imported
    e.target.value='';
  };
  reader.readAsText(file);
});

function showConflictUI(conflicts, freshCount){
  const list=document.getElementById('strat-list');
  list.innerHTML=`
    <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
      ${freshCount} strat${freshCount!==1?'s':''} imported.
      ${conflicts.length} strat${conflicts.length!==1?'s already exist':' already exists'} — choose what to do with each:
    </div>`;

  const pending=new Map(); // name+map → 'keep' | 'replace'
  conflicts.forEach(c=>{
    const key=c.incoming.name+'__'+c.incoming.map;
    pending.set(key,'keep'); // default: keep existing

    const mapName=document.querySelector(`#map-sel option[value="${c.incoming.map}"]`)?.textContent||c.incoming.map;
    const card=document.createElement('div');
    card.className='conflict-card';
    card.innerHTML=`
      <div class="conflict-name">${c.incoming.name} <span style="font-size:10px;color:var(--text3);font-weight:400">${mapName}</span></div>
      <div class="conflict-btns">
        <button class="conflict-btn keep active-choice" data-key="${key}" data-choice="keep">✓ Keep mine</button>
        <button class="conflict-btn replace" data-key="${key}" data-choice="replace">↺ Replace with imported</button>
      </div>`;
    list.appendChild(card);
  });

  // Wire conflict buttons
  list.querySelectorAll('.conflict-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const key=btn.dataset.key;
      const choice=btn.dataset.choice;
      pending.set(key,choice);
      // Highlight active choice
      list.querySelectorAll(`[data-key="${key}"]`).forEach(b=>b.classList.remove('active-choice'));
      btn.classList.add('active-choice');
    });
  });

  // Add confirm button
  const confirm=document.createElement('button');
  confirm.className='modal-action-btn primary';
  confirm.style='margin-top:12px;width:100%;height:38px;border-radius:7px';
  confirm.textContent='✓ Confirm Choices';
  confirm.addEventListener('click',()=>{
    const lib=getLibrary();
    conflicts.forEach(c=>{
      const key=c.incoming.name+'__'+c.incoming.map;
      if(pending.get(key)==='replace'){
        const idx=lib.findIndex(e=>e.name===c.incoming.name&&e.map===c.incoming.map);
        if(idx>=0) lib[idx]=c.incoming;
      }
    });
    saveLibrary(lib);
    const replaced=Array.from(pending.values()).filter(v=>v==='replace').length;
    const kept=conflicts.length-replaced;
    showToast(`Done — ${replaced} replaced, ${kept} kept`,'success');
    openLibrary();
  });
  list.appendChild(confirm);
}

function syncNotesBar(){
  const val=document.getElementById('notes').value.trim();
  const disp=document.getElementById('notes-display');
  if(val){disp.textContent=val;disp.classList.remove('empty');}
  else{disp.textContent='No notes yet — add them in the sidebar';disp.classList.add('empty');}
}

/* ══════════════════════════════════════════
   MOBILE WIRING
══════════════════════════════════════════ */
(function(){
  const isMobile = () => window.innerWidth <= 768;

  // Sync mob-sname ↔ desktop sname
  const mobSname = document.getElementById('mob-sname');
  const deskSname = document.getElementById('sname');
  mobSname.addEventListener('input', () => { deskSname.value = mobSname.value; });
  deskSname.addEventListener('input', () => { mobSname.value = deskSname.value; });

  // Sync mob-map ↔ desktop map-sel
  const mobMap = document.getElementById('mob-map');
  const deskMap = document.getElementById('map-sel');
  mobMap.addEventListener('change', () => {
    deskMap.value = mobMap.value;
    currentMap = mobMap.value;
    mapLoaded = false;
    loadMap(currentMap);
  });
  deskMap.addEventListener('change', () => { mobMap.value = deskMap.value; });

  // Mobile tool buttons
  document.querySelectorAll('[data-mob-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-mob-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTool = btn.dataset.mobTool;
    });
  });

  // Mobile undo
  document.getElementById('mob-undo-btn').addEventListener('click', undo);

  // Mobile library
  document.getElementById('mob-lib-btn').addEventListener('click', openLibrary);

  // Notes sheet
  const notesOverlay = document.getElementById('mob-notes-overlay');
  const mobNotesTa   = document.getElementById('mob-notes-ta');
  const deskNotes    = document.getElementById('notes');

  document.getElementById('mob-notes-btn').addEventListener('click', () => {
    mobNotesTa.value = deskNotes.value;
    notesOverlay.classList.add('open');
    setTimeout(() => mobNotesTa.focus(), 100);
  });
  function closeMobNotes() {
    deskNotes.value = mobNotesTa.value;
    syncNotesBar();
    notesOverlay.classList.remove('open');
  }
  document.getElementById('mob-notes-close').addEventListener('click', closeMobNotes);
  document.getElementById('mob-notes-done').addEventListener('click', closeMobNotes);
  notesOverlay.addEventListener('click', e => { if(e.target === notesOverlay) closeMobNotes(); });

  // Color sheet
  const colorOverlay = document.getElementById('mob-color-overlay');
  document.getElementById('mob-color-btn').addEventListener('click', () => colorOverlay.classList.add('open'));
  function closeMobColor() { colorOverlay.classList.remove('open'); }
  document.getElementById('mob-color-close').addEventListener('click', closeMobColor);
  document.getElementById('mob-color-done').addEventListener('click', closeMobColor);
  colorOverlay.addEventListener('click', e => { if(e.target === colorOverlay) closeMobColor(); });

  // Mobile player color dots
  document.querySelectorAll('#mob-player-colors .mob-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('#mob-player-colors .mob-dot').forEach(d => { d.style.borderColor='transparent'; d.classList.remove('active'); });
      dot.style.borderColor = '#fff'; dot.classList.add('active');
      setPlayerColor(dot.dataset.pcolor);
      // also sync desktop picker
      document.querySelectorAll('.pc-global').forEach(d => { d.style.borderColor='transparent'; d.classList.remove('active'); });
      const match = document.querySelector(`.pc-global[data-pcolor="${dot.dataset.pcolor}"]`);
      if(match){ match.style.borderColor='#fff'; match.classList.add('active'); }
    });
  });

  // Mobile line color dots
  document.querySelectorAll('#mob-line-colors .mob-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('#mob-line-colors .mob-dot').forEach(d => { d.style.borderColor='transparent'; d.classList.remove('active'); });
      dot.style.borderColor = '#fff'; dot.classList.add('active');
      currentColor = dot.dataset.color;
      // sync desktop
      document.querySelectorAll('.c-dot').forEach(d => d.classList.remove('active'));
      const match = document.querySelector(`.c-dot[data-color="${dot.dataset.color}"]`);
      if(match) match.classList.add('active');
    });
  });

  // On resize, keep things consistent
  window.addEventListener('resize', () => {
    if(isMobile()){
      mobSname.value = deskSname.value;
      mobMap.value   = deskMap.value;
    }
  });
})();

</script>
